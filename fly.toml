app = "aroluz-cotizador"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  TZ   = "America/Lima"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "aroluz_data"
  destination = "/app/web/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
